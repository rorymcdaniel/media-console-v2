name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve or create tag
        id: resolve_tag
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            TAG="$REF_NAME"
            echo "Using pushed tag: $TAG"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -z "$LATEST_TAG" ]]; then
              NEW_TAG="v1.0.0"
            elif [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}; MINOR=${BASH_REMATCH[2]}; PATCH=${BASH_REMATCH[3]}
              NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            elif [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}; MINOR=${BASH_REMATCH[2]}
              NEW_TAG="v${MAJOR}.${MINOR}.0"
            else
              NEW_TAG="v1.0.0"
            fi
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$NEW_TAG"
            TAG="$NEW_TAG"
            echo "Created and pushed tag: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --generate-notes \
            --title "$RELEASE_TAG"

  deploy:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H pi5 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 100.77.127.111 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 rory@pi5 "echo 'SSH connection successful'"

      - name: Deploy to Raspberry Pi
        env:
          DEPLOY_TAG: ${{ needs.release.outputs.tag }}
        run: |
          ssh -o StrictHostKeyChecking=no rory@pi5 << ENDSSH
            set -e
            cd /home/rory/Code/media-console-v2
            git fetch origin --tags
            git checkout -- .
            git checkout $DEPLOY_TAG
            bash deploy/pi-build.sh
          ENDSSH

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_TAG: ${{ needs.release.outputs.tag }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"Release ${DEPLOY_TAG} was just deployed!\"}" \
            "$DISCORD_WEBHOOK_URL"
